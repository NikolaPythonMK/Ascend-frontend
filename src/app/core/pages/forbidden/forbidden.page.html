<section class="empty-state" role="alert" aria-live="polite">
  <div class="media" aria-hidden="true">
    @if (imageSrc()) {
      <img [src]="imageSrc()!" alt="" />
    } @else {
      <!-- Big lock icon -->
      <svg viewBox="0 0 24 24" width="160" height="160">
        <path d="M12 2a5 5 0 00-5 5v3H5a2 2 0 00-2 2v8a2 2 0 002 2h14a2 2 0 002-2v-8a2 2 0 00-2-2h-2V7a5 5 0 00-5-5zm-3 8V7a3 3 0 116 0v3H9z"/>
      </svg>
    }
  </div>

  <h1>{{ title() | translate }}</h1>
  <p class="subtitle">{{ message() | translate }}</p>
</section>
