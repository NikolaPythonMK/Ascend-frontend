<div class="test">
    @for(element of elements(); track element.id){
        <div class="card-container">
            <div class="test-card" appearance="outlined" (click)="onSelect(element)">
                <img mat-card-image [src]="element.image ?? 'assets/images/no-image-icon.png'" [alt]="element.description">
            </div>
            <div class="card-label">
                <span class="label">{{ element.title }}</span>
            </div>
            <div class="card-price">
                <span class="label">30000</span>
            </div>
        </div>
    }
</div>
