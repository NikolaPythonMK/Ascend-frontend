<button
  [ngClass]="{
    'primary-btn': type() === 'primary',
    'secondary-btn': type() === 'secondary'
  }"
  (click)="onClick()"
  [disabled]="disabled()"
  [type]="submitBtn()"
>
  @if (icon()) {
    <mat-icon class="icon">{{ icon() }}</mat-icon>
  }
  {{ computedLabel() | translate }}
</button>
