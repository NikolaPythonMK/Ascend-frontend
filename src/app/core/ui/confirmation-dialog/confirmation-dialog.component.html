<div class="confirmation-dialog">
    <div class="dialog-content">
      <h2 class="dialog-title">Потврди</h2>
      <p class="dialog-message">Дали сте сигурни дека сакате да продолжите?</p>
      <div class="dialog-actions">
        <ascend-button type="primary" (clickEvent)="onConfirm()"/>
        <ascend-button type="secondary" (clickEvent)="onCancel()"/>
      </div>
    </div>
  </div>
