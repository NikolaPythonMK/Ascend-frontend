<table>
    <thead>
        <tr>
            @for (col of displayedColumns; track col) {
                @if (col === 'People') {
                    <th><mat-icon>group</mat-icon></th>
                } @else {
                    <th>{{ col }}</th>
                }
            }
        </tr>
    </thead>
    <tbody>
        @for (row of dataSource(); track row.id) {
            <tr (click)="handleRowClick(row.id)">
                <td>{{ row.id }}</td>
                <td><span [ngClass]="{
                    'available': row.status.toString() === 'Available',
                    'occupied': row.status.toString() === 'Occupied'
                }">{{ row.status }}</span></td>
                <td class="price">{{ row.totalPrice }} MKD</td>
            </tr>
        }
    </tbody>
</table>
