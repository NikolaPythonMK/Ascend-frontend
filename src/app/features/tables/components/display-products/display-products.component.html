<div class="products-header">
    <div class="title-header">
      <h3 class="title">Продукти</h3>
      <span class="counter">{{ totalCounts() }}</span>
    </div>
    <div class="products-filter">
      <select class="category-select" (change)="onCategoryChange($event)">
        <option defaultSelected [value]="null">Сите</option>
        @for (category of categories(); track category.id) {
          <option [value]="category.id">{{ category.name }}</option>
        }
      </select>
      <ascend-search-bar class="search-bar" (onSearchTerm)="onSearchTerm($event)" />
    </div>
  </div>
  <ul
  >
    @for (product of products(); track product.id; let i = $index) {
        <li [ngClass]="{'selected-product': selectedProductID() === product.id}"
            (click)="onActiveProduct(product)"
        >
          <p class="li-code">{{ product.code }}</p>
          <p>{{ product.name }}</p>
          <img src="https://www.foodiesfeed.com/wp-content/uploads/2023/06/burger-with-melted-cheese.jpg" />
        </li>
    }
  </ul>
