@if (false) {
    <ascend-skeleton-item [count]="5"/>
}@else {
    <ul class="data-list">
        <li (click)="onSelectCategory(null)">All</li>
        @for (category of categories(); track category.id) {
            <li (click)="onSelectCategory(category.id)" [ngClass]="{'selected-li': category.id === selectedId()}">
                {{ category.name }}
            </li>
        }
    </ul>
}
