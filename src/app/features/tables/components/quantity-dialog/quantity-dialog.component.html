<div class="dialog-wrapper">
  <div class="image-container">
    <img src="https://www.foodiesfeed.com/wp-content/uploads/2023/06/burger-with-melted-cheese.jpg" class="product-image" />
  </div>
  <div class="info-container">
    <div class="header">
      <h2>{{ product.name }} - </h2>
      <h2> {{ product.code }}</h2>
    </div>
    <div class="quantity-input">
      <button class="value-control" onclick="numberInput.stepDown()" [title]="'quantity-dialog.decrease-value | translate'" [ariaLabel]="'quantity-dialog.decrease-value | translate'" type="submit">-</button>
  
      <input class="value-input" type="number" value="1" min="-5" name="numberInput" id="numberInput">
      
      <button class="value-control" onclick="numberInput.stepUp()" [title]="'quantity-dialog.increase-value | translate'" [ariaLabel]="'quantity-dialog.increase-value | translate'">+</button>
    </div>

    <mat-dialog-actions>
      <button mat-button (click)="onAddToCart()" class="primary-btn">{{ 'shared.add' | translate }}</button>
      <button mat-button (click)="dialogRef.close()" class="default-btn">{{ 'shared.cancel' | translate }}</button>
    </mat-dialog-actions>
  </div>
</div>
