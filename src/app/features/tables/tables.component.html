<div class="tables-header">
    <div class="left-part">
        <div class="title">{{ 'tables.title' | translate }}</div>
        <div class="grid-buttons">
            <mat-icon><span [ngClass]="{'selected-header-item': selectedView() === 'table'}"
                            (click)="handleViewChange('table')"
                            class="clickable-item">table_view</span></mat-icon>
            <mat-icon><span [ngClass]="{'selected-header-item': selectedView() === 'grid'}"
                            (click)="handleViewChange('grid')"
                            class="clickable-item">grid_view</span></mat-icon>
        </div>
    </div>

    <!-- <div class="toggle-buttons">
        <button>All</button>
        <button>Occupied</button>
        <button>Available</button>
    </div> -->

    <ascend-search-bar class="search-bar"/>
</div>


@if (selectedView() === 'table') {
    <table-view [dataSource]="dataSource" (clickedTableId)="openDialog($event)" />
} @else {
    <grid-view  [dataSource]="dataSource" (clickedTableId)="openDialog($event)" />
}
