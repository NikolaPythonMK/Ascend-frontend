

  <form class="roles-form" [formGroup]="roleForm">
    <mat-form-field>
      <mat-label>{{ 'staff.roles.name' | translate }}</mat-label>
      <input matInput formControlName="name">
    </mat-form-field>

      <div class="button-group">
        <ascend-button type="primary" (clickEvent)="onSubmit()"/>
        <ascend-button type="secondary" (clickEvent)="onClose()" />
      </div>
  </form>
