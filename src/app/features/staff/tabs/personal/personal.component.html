<div class="personal-scroll">
  <ascend-table
    [title]="'staff.personal.personal' | translate"
    [dataRows]="staffUsersRows()"
    [displayedColumns]="colDisplayNames()"
    [nonSortableColumns]="nonSortableColumns()"
    (addEvent)="onAddStaff()"
    (searchEvent)="onSearch($event)"
    (sortEvent)="onSort($event)"
    (clickedRowEvent)="onUpdateStaff($event)"
    [hasAddBtn]="canCreate()"
  />
</div>
