<div class="tabs-wrapper page-padding">
  <mat-tab-group class="staff-tabs" animationDuration="180ms">
  @if (canViewPersonal) {
  <mat-tab [label]="'staff.tab-title-staff' | translate">
    <ng-template matTabContent>
      <div class="content-wrapper">
        <personal-component />
      </div>
    </ng-template>
  </mat-tab>
  }
  @if (canViewRoles) {
  <mat-tab [label]="'staff.tab-title-roles' | translate">
    <ng-template matTabContent>
      <div class="content-wrapper">
        <roles-component />
      </div>
    </ng-template>
  </mat-tab>
  }
</mat-tab-group>
</div>
