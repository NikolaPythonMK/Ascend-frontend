<div class="wrapper page-padding">
  <ascend-table
    [displayedColumns]="colDisplayNames()"
    [dataRows]="locationRows()"
    [title]="'locations.locations' | translate"
    (addEvent)="onAdd()"
    (clickedRowEvent)="onUpdate($event)"
    (searchEvent)="onSearch($event)"
    (sortEvent)="onSort($event)"
    [hasAddBtn]="canCreate()"
  />
</div>
