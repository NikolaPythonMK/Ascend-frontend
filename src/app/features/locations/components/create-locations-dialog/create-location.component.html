<ascend-loader [loading]="loading()" />
<h2 mat-dialog-title class="dialog-title">Add Location</h2>
<form [formGroup]="locationForm" (ngSubmit)="onSubmit()" class="dialog-form">
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Location Name</mat-label>
    <input matInput formControlName="name" placeholder="Enter location name" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Table Count</mat-label>
    <input matInput type="number" formControlName="tableCount" min="0" />
  </mat-form-field>

  <div class="actions">
    <button mat-button type="button" (click)="dialogRef.close()">Cancel</button>
    <!-- <button mat-flat-button color="primary" type="submit" [disabled]="locationForm.invalid">
      Save
    </button> -->
    <ascend-button type="primary" label="Додади" [disabled]="locationForm.invalid"/>
  </div>
</form>
