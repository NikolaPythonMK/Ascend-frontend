<div class="settings-container">
  <!-- Dropdown Section -->
  <div class="settings-section dropdown-section">
    <div class="title-container">
        <span class="title">Staff Preferences</span>
    </div>
    @for (option of dropdownOptions(); track option.id) {
      <div class="setting-row">
        <span class="setting-label">{{ option.label }}</span>

        <div class="custom-dropdown" [class.open]="isDropdownOpen(option.id)">
          <div class="dropdown-trigger" (click)="toggleDropdown(option.id)">
            <span class="selected-value">{{ getSelectedLabel(option) }}</span>
            <span class="dropdown-arrow">▼</span>
          </div>

          @if (isDropdownOpen(option.id)) {
            <div class="dropdown-menu">
              @for (dropdownOption of option.options; track dropdownOption.value) {
                <div
                  class="dropdown-option"
                  [class.selected]="dropdownOption.value === option.selectedValue"
                  (click)="selectOption(option.id, dropdownOption.value)">
                  {{ dropdownOption.label }}
                </div>
              }
            </div>
          }
        </div>
      </div>
    }
  </div>

  <div class="buttons-section">
    <ascend-button type="primary" label="Update" (clickEvent)="onSubmit()"/>
  </div>
</div>
