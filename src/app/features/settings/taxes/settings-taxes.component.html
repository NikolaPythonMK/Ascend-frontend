<ascend-loader [loading]="loading()" />
<div class="container">
  <div class="content">
    <ascend-table
      [dataRows]="taxRows()"
      [displayedColumns]="colDisplayNames()"
      [title]="'Taxes'"
      (addEvent)="onAdd()"
      (clickedRowEvent)="onUpdate($event)"
    />
    @if (taxes().length == 0) {
      <div class="no-data-container">
        <p class="no-data-msg">No taxes have been found.</p>
      </div>
    }
  </div>
</div>
