<ascend-loader [loading]="loading()" />
<h2 mat-dialog-title class="dialog-title">{{ 'settings.taxes.add-tax' | translate }}</h2>
<div class="content">
  <form [formGroup]="taxForm" (ngSubmit)="onSubmit()" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'settings.taxes.name' | translate }}</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'settings.taxes.percentage' | translate }}</mat-label>
      <input matInput type="number" formControlName="percentage" min="0" (keydown.enter)="onSubmit()" />
    </mat-form-field>

    <div class="actions">
      <button mat-button type="button" (click)="dialogRef.close()">
        {{ 'shared.cancel' | translate }}
      </button>
      <ascend-button
        type="primary"
        [label]="'shared.add' | translate"
        [disabled]="taxForm.invalid"
      />
    </div>
  </form>
</div>
