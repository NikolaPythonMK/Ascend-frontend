<h2 mat-dialog-title class="dialog-title">Додади Категорија</h2>

<form [formGroup]="categoryForm" (ngSubmit)="onSubmit()" class="dialog-form">
  
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Category Name</mat-label>
      <input matInput formControlName="name" required />
    </mat-form-field>



    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Description (optional)</mat-label>
      <textarea matInput formControlName="description"></textarea>
    </mat-form-field>

    @if (data.categoryGroups.length) {
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Category Group</mat-label>
        <mat-select formControlName="selectedCategoryGroup">
          @for (group of data.categoryGroups; track group.id) {
            <mat-option [value]="group.id">{{group.name}}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    }

  <div class="full-width upload-container">
    <span>Прикачи слика (optional)</span>
    <ascend-upload-image (uploadEvent)="onUpload($event)" />
  </div>

  <div class="actions">
    <button mat-button type="button" (click)="dialogRef.close()">Откажи</button>
    <ascend-button type="primary" [label]="'Додади'" [disabled]="categoryForm.invalid" />
  </div>
</form>
