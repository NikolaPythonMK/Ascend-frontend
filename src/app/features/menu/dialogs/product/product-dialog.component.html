<h2 mat-dialog-title class="dialog-title">{{ this.title() }}</h2>

<form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="dialog-form">
  
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Product Name</mat-label>
      <input matInput formControlName="name" required />
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
        <mat-label>Code</mat-label>
        <input matInput formControlName="code" />
      </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
        <mat-label>Price</mat-label>
        <input type="number" matInput formControlName="price" required />
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Description (optional)</mat-label>
      <textarea matInput formControlName="description"></textarea>
    </mat-form-field>

    @if (categories().length) {
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Categories</mat-label>
        <mat-select formControlName="category">
          @for (category of categories(); track category.id) {
            <mat-option [value]="category.id">{{ category.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    }

  <div class="full-width upload-container">
    <span>Прикачи слика (optional)</span>
    <ascend-upload-image (uploadEvent)="onUpload($event)"  />
  </div>

  <div class="actions">
    @if (isUpdateDialog()) {
      <mat-icon class="trash-btn" (click)="onDelete()">delete</mat-icon>
    }
    <button mat-button type="button" (click)="dialogRef.close()">Откажи</button>
    <ascend-button type="primary" [label]="submitBtnLabel()" [disabled]="productForm.invalid" />
  </div>
</form>
