<div class="container">
  <div class="list-container">
    <div>
      <p class="title title-category-list">Категории</p>
    </div>
    <ascend-display-list  [elements]="categoryListElements()"
                          selectAllButtonLabel="Сите категории"
                          (selectedEvent)="onSelectCategory($event)"
                          [setDeleteButton]="false"
                          [setSelectAllButton]="false" />
  </div>
  <div class="cards-container">
    <div class="cards-header">
      <div class="left-part">
          @if (selectedCategory()){
              <span class="title">Продукти > {{ selectedCategory()!.name }}</span>
          }@else {
              <span class="title">Продукти > Сите продукти</span>
          }
          <ascend-header-counter [value]="products().length" />
      </div>
      <div class="right-part">
          <button mat-fab extended color="ascend" class="add-category-btn" (click)="onAddProduct()">
              <mat-icon>add</mat-icon>
              Продукт
          </button>

          <ascend-search-bar (onSearchTerm)="onSearchProducts($event)" />
      </div>
  </div>
  <ascend-display-cards (selectedCard)="onProductedit($event)"  [elements]="productCards()" />   
  </div>
</div>
